<!-- Lead Form Modal -->
<style>
  .lead-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .lead-overlay.active { display: flex; }
  .lead-modal {
    background: white;
    border-radius: 16px;
    width: 90%;
    max-width: 440px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: leadSlide 0.3s ease;
    position: relative;
  }
  @keyframes leadSlide { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .lead-header {
    background: linear-gradient(135deg, #01263b, #0367a1);
    color: white;
    padding: 24px;
    text-align: center;
  }
  .lead-header h3 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .lead-header p { font-size: 13px; opacity: 0.85; }
  .lead-body { padding: 24px; }
  .lead-field { margin-bottom: 16px; }
  .lead-field label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .lead-field input, .lead-field select {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #E5E7EB;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
    box-sizing: border-box;
  }
  .lead-field input:focus, .lead-field select:focus { border-color: #00BCD4; }
  .lead-submit {
    width: 100%;
    background: linear-gradient(135deg, #F6D835, #FFD700);
    color: #111;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .lead-submit:hover { transform: translateY(-2px); }
  .lead-submit:disabled { opacity: 0.7; cursor: wait; }
  .lead-close {
    position: absolute;
    top: 12px; right: 16px;
    background: none; border: none;
    color: white; font-size: 24px;
    cursor: pointer; opacity: 0.7; z-index: 1;
  }
  .lead-close:hover { opacity: 1; }
  .lead-note { text-align: center; font-size: 11px; color: #9CA3AF; margin-top: 12px; }
  .lead-success { display: none; text-align: center; padding: 40px 24px; }
  .lead-success-icon { font-size: 48px; margin-bottom: 12px; }
  .lead-success h3 { font-size: 20px; font-weight: 700; color: #2E7D32; margin-bottom: 8px; }
  .lead-success p { font-size: 14px; color: #6B7280; margin-bottom: 16px; }
  .lead-success a {
    display: inline-block;
    background: #00BCD4; color: white;
    padding: 12px 24px; border-radius: 8px;
    text-decoration: none; font-weight: 600; font-size: 14px;
  }
</style>

<div class="lead-overlay" id="leadModal">
  <div class="lead-modal">
    <button class="lead-close" onclick="closeLead()">&times;</button>

    <div class="lead-header">
      <h3 id="leadTitle">📝 Get Free AISSEE Guide</h3>
      <p id="leadSubtitle">Enter your details to access the resource</p>
    </div>

    <div class="lead-body" id="leadForm">
      <div class="lead-field">
        <label>Full Name *</label>
        <input type="text" id="leadName" placeholder="Enter your name" required>
      </div>
      <div class="lead-field">
        <label>WhatsApp Number *</label>
        <input type="tel" id="leadPhone" placeholder="Enter 10-digit number" pattern="[0-9]{10}" required>
      </div>
      <div class="lead-field">
        <label>Email Address</label>
        <input type="email" id="leadEmail" placeholder="Enter email (optional)">
      </div>
      <div class="lead-field">
        <label>Interested In</label>
        <select id="leadInterest">
          <option value="class6">Sainik School Class 6 Admission</option>
          <option value="class9">Sainik School Class 9 Admission</option>
          <option value="nda">NDA Preparation</option>
          <option value="coaching">Coaching Information</option>
          <option value="other">Other</option>
        </select>
      </div>
      <button class="lead-submit" id="leadSubmitBtn" onclick="submitLead()">Submit & Access →</button>
      <div class="lead-note">🔒 Your info is safe. We never spam.</div>
    </div>

    <div class="lead-success" id="leadSuccess">
      <div class="lead-success-icon">✅</div>
      <h3>Thank You!</h3>
      <p id="leadSuccessMsg">Your resource is ready.</p>
      <a id="leadSuccessLink" href="/" target="_blank">Access Resource →</a>
    </div>
  </div>
</div>

<script>
function openLead(title, subtitle, redirectUrl) {
  document.getElementById('leadTitle').textContent = title || '📝 Get Free AISSEE Guide';
  document.getElementById('leadSubtitle').textContent = subtitle || 'Enter your details to access';
  document.getElementById('leadModal').classList.add('active');
  document.getElementById('leadModal').dataset.redirect = redirectUrl || '';
  document.getElementById('leadForm').style.display = 'block';
  document.getElementById('leadSuccess').style.display = 'none';
  document.body.style.overflow = 'hidden';
}

function closeLead() {
  document.getElementById('leadModal').classList.remove('active');
  document.body.style.overflow = '';
}

function submitLead() {
  var name = document.getElementById('leadName').value.trim();
  var phone = document.getElementById('leadPhone').value.trim();
  var email = document.getElementById('leadEmail').value.trim();
  var interest = document.getElementById('leadInterest').value;
  var btn = document.getElementById('leadSubmitBtn');

  if (!name) { alert('Please enter your name'); return; }
  if (!phone || phone.length !== 10) { alert('Please enter valid 10-digit number'); return; }

  btn.textContent = 'Submitting...';
  btn.disabled = true;

  // Save to Google Sheets via Apps Script Web App
  var data = new FormData();
  data.append('name', name);
  data.append('phone', phone);
  data.append('email', email);
  data.append('interest', interest);
  data.append('page', window.location.pathname);

  // Google Sheets webhook URL - replace with your Apps Script URL
  var SHEET_URL = 'https://script.google.com/macros/s/AKfycbx_REPLACE_WITH_YOUR_SCRIPT_ID/exec';

  fetch(SHEET_URL, { method: 'POST', body: data })
  .then(function(r) { return r.json(); })
  .then(function() { showSuccess(); })
  .catch(function() {
    // Fallback: save locally
    var leads = JSON.parse(localStorage.getItem('ssg_leads') || '[]');
    leads.push({ name: name, phone: phone, email: email, interest: interest, page: window.location.pathname, time: new Date().toISOString() });
    localStorage.setItem('ssg_leads', JSON.stringify(leads));
    showSuccess();
  });
}

function showSuccess() {
  document.getElementById('leadForm').style.display = 'none';
  document.getElementById('leadSuccess').style.display = 'block';

  var redirect = document.getElementById('leadModal').dataset.redirect;
  if (redirect) {
    document.getElementById('leadSuccessMsg').textContent = 'Redirecting to your resource...';
    document.getElementById('leadSuccessLink').href = redirect;
    document.getElementById('leadSuccessLink').textContent = 'Go to Resource →';
    setTimeout(function() { window.open(redirect, '_blank'); closeLead(); }, 2000);
  } else {
    document.getElementById('leadSuccessMsg').textContent = 'We will contact you soon!';
    document.getElementById('leadSuccessLink').href = '/';
    document.getElementById('leadSuccessLink').textContent = 'Back to Home';
  }

  document.getElementById('leadName').value = '';
  document.getElementById('leadPhone').value = '';
  document.getElementById('leadEmail').value = '';
  document.getElementById('leadSubmitBtn').textContent = 'Submit & Access →';
  document.getElementById('leadSubmitBtn').disabled = false;
}

document.getElementById('leadModal').addEventListener('click', function(e) {
  if (e.target === this) closeLead();
});
</script>
