name: Build & Verify

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Hugo Site
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Verify Build
        run: |
          echo "Pages built: $(find public -name '*.html' | wc -l)"
          echo "Build size: $(du -sh public | cut -f1)"
          ls public/
