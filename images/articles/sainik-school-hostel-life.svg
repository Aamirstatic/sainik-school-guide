<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative -->
  <circle cx="100" cy="530" r="70" fill="rgba(255,255,255,0.08)"/>
  <circle cx="1100" cy="100" r="90" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Badge -->
  <rect x="80" y="80" width="160" height="32" rx="16" fill="white"/>
  <text x="160" y="101" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7C3AED" text-anchor="middle">STUDENT LIFE</text>
  
  <!-- Title -->
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="white">Sainik School</text>
  <text x="80" y="230" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#F6D835">Hostel Life</text>
  
  <!-- Subtitle -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)">What Your Child Will Experience</text>
  
  <!-- Daily Routine Preview -->
  <rect x="80" y="330" width="300" height="160" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="100" y="360" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white">📅 Daily Routine</text>
  <text x="100" y="385" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">5:30 AM - Wake up</text>
  <text x="100" y="405" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">6:00 AM - Physical Training</text>
  <text x="100" y="425" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">7:30 AM - Classes Begin</text>
  <text x="100" y="445" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">4:00 PM - Sports</text>
  <text x="100" y="465" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">+10 more activities...</text>
  
  <!-- Facilities -->
  <rect x="420" y="330" width="200" height="160" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="520" y="360" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">🏠 Facilities</text>
  <text x="520" y="390" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F6D835" text-anchor="middle">10+</text>
  <text x="520" y="415" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Sports & Activities</text>
  
  <!-- Author -->
  <circle cx="80" cy="560" r="20" fill="#7C3AED"/>
  <text x="80" y="566" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">R</text>
  <text x="110" y="556" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white">Rifaul Hasan</text>
  <text x="110" y="576" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Student Counselor</text>
  
  <!-- Logo -->
  <rect x="1000" y="560" width="120" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="1060" y="585" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">SS Guide</text>
</svg>
