<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01263b"/>
      <stop offset="100%" style="stop-color:#0367a1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="500" r="120" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Badge -->
  <rect x="80" y="80" width="120" height="32" rx="16" fill="#F6D835"/>
  <text x="140" y="101" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#111" text-anchor="middle">SAINIK SCHOOL</text>
  
  <!-- Title -->
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white">Sainik School</text>
  <text x="80" y="230" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#F6D835">Admission 2027</text>
  
  <!-- Subtitle -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">Complete Guide: Age Limit, Fees &</text>
  <text x="80" y="310" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">Step-by-Step Process</text>
  
  <!-- Stats -->
  <rect x="80" y="370" width="150" height="60" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="155" y="395" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F6D835" text-anchor="middle">33+</text>
  <text x="155" y="415" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Schools</text>
  
  <rect x="250" y="370" width="150" height="60" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="325" y="395" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F6D835" text-anchor="middle">2.5L+</text>
  <text x="325" y="415" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Applicants</text>
  
  <!-- Author -->
  <circle cx="80" cy="520" r="20" fill="#00BCD4"/>
  <text x="80" y="526" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">N</text>
  <text x="110" y="516" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white">Nisha</text>
  <text x="110" y="536" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Education Content Specialist</text>
  
  <!-- Logo -->
  <rect x="1000" y="520" width="120" height="40" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="1060" y="545" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">SS Guide</text>
</svg>
