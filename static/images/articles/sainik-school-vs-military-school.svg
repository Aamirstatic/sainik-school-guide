<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16B364"/>
      <stop offset="100%" style="stop-color:#00BCD4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative -->
  <circle cx="50" cy="50" r="60" fill="rgba(255,255,255,0.08)"/>
  <circle cx="1150" cy="580" r="90" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Badge -->
  <rect x="80" y="80" width="140" height="32" rx="16" fill="white"/>
  <text x="150" y="101" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16B364" text-anchor="middle">COMPARISON</text>
  
  <!-- Title -->
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">Sainik School vs</text>
  <text x="80" y="230" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#F6D835">Military School</text>
  
  <!-- Subtitle -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.9)">Which is Better for Your Child?</text>
  
  <!-- Comparison Table -->
  <rect x="80" y="320" width="500" height="180" rx="8" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Headers -->
  <rect x="80" y="320" width="250" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="205" y="346" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Sainik School</text>
  
  <rect x="330" y="320" width="250" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="455" y="346" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Military School</text>
  
  <!-- Rows -->
  <text x="100" y="385" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Schools:</text>
  <text x="205" y="385" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">33+</text>
  <text x="455" y="385" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">5</text>
  
  <text x="100" y="415" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Fees:</text>
  <text x="205" y="415" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">₹2-2.5L</text>
  <text x="455" y="415" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">₹1-1.5L</text>
  
  <text x="100" y="445" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Gender:</text>
  <text x="205" y="445" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Boys & Girls</text>
  <text x="455" y="445" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Boys Only</text>
  
  <!-- Author -->
  <circle cx="80" cy="560" r="20" fill="#16B364"/>
  <text x="80" y="566" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">S</text>
  <text x="110" y="556" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white">Sameer</text>
  <text x="110" y="576" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">Education Researcher</text>
  
  <!-- Logo -->
  <rect x="1000" y="560" width="120" height="40" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="1060" y="585" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">SS Guide</text>
</svg>
