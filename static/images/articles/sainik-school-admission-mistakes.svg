  <text x="170" y="101" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#DC2626" text-anchor="middle">WARNING ARTICLE</text>
  
  <!-- Title -->
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="white">5 Mistakes Parents</text>
