      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#F6D835"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative -->
  <circle cx="1100" cy="100" r="100" fill="rgba(255,255,255,0.1)"/>
