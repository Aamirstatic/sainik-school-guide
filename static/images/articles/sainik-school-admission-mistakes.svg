  <text x="80" y="566" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <text x="110" y="556" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white">Aamir</text>
